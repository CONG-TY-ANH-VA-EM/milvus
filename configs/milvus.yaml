  txn:
    defaultKeepaliveTimeout: 10s

knowhere:
  enable: true # When enable this configuration, the index parameters defined following will be automatically populated as index parameters, without requiring user input.
  DISKANN:
    build:
      max_degree: 56 # Maximum degree of the Vamana graph
      pq_code_budget_gb_ratio: 0.125 # Size limit on the PQ code (compared with raw data)
      search_cache_budget_gb_ratio: 0.3 # Ratio of cached node numbers to raw data
      search_list_size: 100 # Size of the candidate list during building graph
    search:
      beam_width_ratio: 4 # Ratio between the maximum number of IO requests per search iteration and CPU number
  HNSW:
    build:
      efConstruction: 400 # Increased from 128 for better index quality
      M: 64 # Increased from 32 for better graph connectivity
    search:
      ef: 150 # Increased from 64 for better search quality
  IVFFLAT:
    build:
      nlist: 2048 # Number of clusters
    search:
      nprobe: 256 # Number of clusters to search

cache_config:
  cpu_cache_capacity: 16GB    # Increase based on your available server memory
  gpu_cache_capacity: 8GB    # Adjust if using GPU; ensure that it fits your workload

wal:
  enable: true
  flush_interval: 300   # Flush WAL every 8 seconds; adjust based on your durability vs. performance needs
  buffer_size: 8192MiB  # Example buffer size; ensure this matches your server’s available memory
  wal_path: /milvus/db/wal  # Path for storing WAL logs

engine_config:
  compaction:
    enable_compaction: true         # Ensure that automatic merge is enabled
    compaction_interval: 600          # Run compaction every 600 seconds (10 minutes)
    min_compaction_file_number: 4     # Minimum number of segments to trigger a merge, e.g., 4 small segments
    max_compaction_file_number: 64    # Maximum segments to be merged at one time (adjust based on your dataset and system resources)
